<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youyouboy_dragon_Official | Official Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
        
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            overflow: hidden;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-h-screen;
        }

        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glow-button {
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .glow-button:hover {
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        .error-shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .bg-animate {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="min-h-screen">
    <div class="bg-animate"></div>

    <div id="login-container" class="w-full max-w-md px-6 py-12 glass-panel rounded-3xl shadow-2xl text-center mx-4">
        <!-- ロゴエリア -->
        <div class="mb-8">
            <div class="inline-block p-4 bg-blue-600 rounded-full mb-4 shadow-lg">
                <i class="fas fa-dragon text-4xl text-white"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-wider uppercase">Youyouboy_dragon</h1>
            <p class="text-blue-400 text-sm font-medium mt-1">OFFICIAL VERIFICATION SYSTEM</p>
        </div>

        <!-- フォームエリア -->
        <div class="space-y-6">
            <div class="text-left">
                <label for="password" class="block text-xs font-semibold text-slate-400 uppercase ml-1 mb-2">Access Key</label>
                <div class="relative">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500">
                        <i class="fas fa-key"></i>
                    </span>
                    <!-- type="text" にして最初から見えるように設定 -->
                    <input 
                        type="text" 
                        id="password" 
                        placeholder="パスワードを入力してください"
                        class="w-full bg-slate-800 border border-slate-700 rounded-xl py-4 pl-12 pr-4 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all text-white"
                        autocomplete="off"
                    >
                </div>
                <p id="error-msg" class="hidden text-red-400 text-xs mt-2 ml-1 italic">
                    <i class="fas fa-exclamation-circle mr-1"></i> パスワードが正しくありません
                </p>
            </div>

            <button 
                onclick="checkPassword()" 
                class="w-full glow-button bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all flex items-center justify-center space-x-2"
            >
                <span>アクセスを承認</span>
                <i class="fas fa-chevron-right text-xs"></i>
            </button>
        </div>

        <!-- フッター -->
        <div class="mt-12 pt-6 border-t border-slate-700/50">
            <p class="text-slate-500 text-[10px] uppercase tracking-widest">
                &copy; 2026 Youyouboy_dragon_Official. <br>All Rights Reserved.
            </p>
        </div>
    </div>

    <!-- 成功時のオーバーレイ -->
    <div id="success-overlay" class="fixed inset-0 bg-slate-900 flex flex-col items-center justify-center z-50 transition-opacity duration-500 opacity-0 pointer-events-none px-6 text-center">
        <div class="animate-pulse mb-6">
            <i class="fas fa-check-circle text-8xl text-green-500"></i>
        </div>
        <h2 class="text-3xl font-bold text-white uppercase tracking-widest mb-2">Access Granted</h2>
        <p class="text-slate-400 mb-8">公式リポジトリへ転送します...</p>
        
        <!-- 自動転送が失敗した場合の予備ボタン -->
        <a id="manual-link" href="https://github.com/youyouboydragonOfficial" class="text-blue-400 underline text-sm hover:text-blue-300">
            自動で移動しない場合はこちらをクリック
        </a>
    </div>

    <script>
        const CORRECT_PASSWORD = "1225kosenyouyou";
        const REDIRECT_URL = "https://github.com/youyouboydragonOfficial";

        function checkPassword() {
            const input = document.getElementById('password');
            const errorMsg = document.getElementById('error-msg');
            const container = document.getElementById('login-container');
            const successOverlay = document.getElementById('success-overlay');

            // 前後の空白を削除して判定
            if (input.value.trim() === CORRECT_PASSWORD) {
                errorMsg.classList.add('hidden');
                
                // 成功画面を表示
                successOverlay.classList.remove('pointer-events-none');
                successOverlay.style.opacity = "1";
                
                // 1.2秒後にリダイレクト実行
                setTimeout(() => {
                    // window.location.href よりも強力な replace を使用
                    window.location.replace(REDIRECT_URL);
                }, 1200);
            } else {
                // 失敗
                errorMsg.classList.remove('hidden');
                container.classList.add('error-shake');
                input.classList.add('border-red-500');
                
                setTimeout(() => {
                    container.classList.remove('error-shake');
                }, 400);

                // 入力をクリアせずに選択状態にする（修正しやすくするため）
                input.select();
            }
        }

        // Enterキー対応
        document.getElementById('password').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
